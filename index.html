<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Menu</title>
</head>
<body>
    <div class="diz__container">
        <h1 class="diz__yes">
            Menu for Restaurant
        </h1>
        <div class="diz__card-container">
            <div class="diz__card">
                <img src="images/Burger and Potato.webp" alt="">
                <h4 class="diz__name">Burger and potato</h4>
                <h4 class="diz__price">Price: 5$</h4>
                <button class="diz__button">ORDER</button>
            </div>
            <div class="diz__card">
                <img src="images/Sosiski.jpg" alt="">
                <h4 class="diz__name">Sausages</h4>
                <h4 class="diz__price">Price: 7$</h4>
                <button class="diz__button">ORDER</button>
            </div>
            <div class="diz__card">
                <img src="images/Pasta Tomato.avif" alt="">
                <h4 class="diz__name">Pasta Tomato</h4>
                <h4 class="diz__price">Price: 10$</h4>
                <button class="diz__button">ORDER</button>
            </div>
            <div class="diz__card">
                <img src="images/Burrito.jpg" alt="">
                <h4 class="diz__name">Burrito</h4>
                <h4 class="diz__price">Price: 7$</h4>
                <button class="diz__button">ORDER</button>
            </div>
            <div class="diz__card">
                <img src="images/Eda.jpg" alt="">
                <h4 class="diz__name">Pilaf</h4>
                <h4 class="diz__price">Price: 10$</h4>
                <button class="diz__button">ORDER</button>
            </div>
            <div class="diz__card">
                <img src="images/Maqlooba.jpg" alt="">
                <h4 class="diz__name">Maqlooba</h4>
                <h4 class="diz__price">Price: 15$</h4>
                <button class="diz__button">ORDER</button>
            </div>
        </div>
    </div>
</body>
</html>
